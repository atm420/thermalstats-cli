# ──────────────────────────────────────────────────────────────────
# ThermalStats CLI — Build, Release & Deploy
#
# Builds all platform binaries on every push to main or on tag.
# - Push to main  → builds + deploys binaries to Digital Ocean
# - Tag v*        → builds + creates GitHub Release + deploys
# - Manual        → builds + deploys
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   DROPLET_HOST    — Server IP (e.g. 167.99.186.82)
#   DROPLET_USER    — SSH user (e.g. root)
#   DROPLET_SSH_KEY — Private SSH key (paste full key including BEGIN/END lines)
# ──────────────────────────────────────────────────────────────────

name: Build & Release CLI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: thermalstats.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: thermalstats-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: thermalstats-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install OpenCL (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ocl-icd-opencl-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/thermalstats${{ runner.os == 'Windows' && '.exe' || '' }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 90

  # Deploy binaries to the Digital Ocean droplet on every main push or manual trigger
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy binaries to server
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          SERVER="${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}"

          # Create a staging directory with the binaries
          mkdir -p deploy_binaries
          cp artifacts/thermalstats.exe/thermalstats.exe deploy_binaries/
          cp artifacts/thermalstats-linux/thermalstats-linux deploy_binaries/
          cp artifacts/thermalstats-macos/thermalstats-macos deploy_binaries/
          chmod +x deploy_binaries/thermalstats-linux
          chmod +x deploy_binaries/thermalstats-macos

          # Ensure target directories exist on the server
          $SSH_CMD "$SERVER" "mkdir -p /opt/thermalstats/standalone/public/downloads /opt/thermalstats/app/public/downloads"

          echo "==> Uploading binaries to server..."
          rsync -avz -e "$SSH_CMD" \
            deploy_binaries/ \
            "$SERVER":/opt/thermalstats/standalone/public/downloads/

          # Also update the source copy so future Next.js rebuilds include them
          rsync -avz -e "$SSH_CMD" \
            deploy_binaries/ \
            "$SERVER":/opt/thermalstats/app/public/downloads/

          echo "==> Binaries deployed successfully!"

  # Create a GitHub Release when a version tag is pushed
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/thermalstats.exe/thermalstats.exe
            artifacts/thermalstats-linux/thermalstats-linux
            artifacts/thermalstats-macos/thermalstats-macos
          generate_release_notes: true
